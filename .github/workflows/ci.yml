name: AssetFlow CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Define Redis service needed for tests and rate limiter
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Run ESLint
      working-directory: ./backend
      run: npm run lint
      continue-on-error: true # Warning only for now

    - name: Run Unit & Integration Tests (Jest)
      working-directory: ./backend
      run: npm test
      env:
        NODE_ENV: test
        JWT_SECRET: test_jwt_secret_minimum_32_characters_for_validation
        JWT_REFRESH_SECRET: test_jwt_refresh_secret_minimum_32_characters
        DATABASE_URL: 'mysql://root:root@localhost:3306/assetflow_test'
        REDIS_HOST: localhost
        REDIS_PORT: 6379

    - name: Upload Test Coverage
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: backend/coverage/
